name: Dev

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

concurrency:
  group: android-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS Dev -> TestFlight
    runs-on: macos-26
    environment: staging

    env:
      CI: 'true'
      FASTLANE_SKIP_UPDATE_CHECK: 'true'
      FASTLANE_DISABLE_COLORS: '1'
      COCOAPODS_DISABLE_STATS: 'true'
      EXPO_NO_TELEMETRY: '1'
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_GRAPHQL_URL: ${{ vars.EXPO_PUBLIC_GRAPHQL_URL_STAGING }}
      EXPO_PUBLIC_AUTH_BASE_URL: ${{ vars.EXPO_PUBLIC_AUTH_BASE_URL_STAGING }}
      EXPO_PUBLIC_AUTH_SCHEME: beekeepr
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}

      IOS_BUNDLE_ID: com.beekeepr.app
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      IOS_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release notes from commit
        run: |
          DELIM="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "RELEASE_NOTES<<$DELIM"
            git log -1 --pretty=format:'%s%n%n%b'
            echo
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Select Xcode 26
        run: |
          XCODE_APP=""
          if [ -d /Applications/Xcode.app ]; then
            XCODE_VERSION="$(/Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild -version | head -n 1 | awk '{print $2}')"
            if [[ "$XCODE_VERSION" == 26* ]]; then
              XCODE_APP="/Applications/Xcode.app"
            fi
          fi
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' ! -name '*beta*' | sort -V | tail -n 1)"
          fi
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          fi
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26 not found on runner"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - run: corepack enable
      - run: yarn install --immutable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build iOS (Fastlane)
        timeout-minutes: 60
        run: bundle exec fastlane ios build --verbose

      - name: Upload TestFlight
        timeout-minutes: 30
        run: bundle exec fastlane ios upload_testflight --verbose

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-dev-build-logs
          path: fastlane/buildlog
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: ios-dev-build
          path: build/*.ipa
          retention-days: 14

  android:
    name: Android Dev -> Firebase
    runs-on: ubuntu-latest
    environment: staging

    env:
      CI: 'true'
      FASTLANE_SKIP_UPDATE_CHECK: 'true'
      EXPO_NO_TELEMETRY: '1'
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_GRAPHQL_URL: ${{ vars.EXPO_PUBLIC_GRAPHQL_URL_STAGING }}
      EXPO_PUBLIC_AUTH_BASE_URL: ${{ vars.EXPO_PUBLIC_AUTH_BASE_URL_STAGING }}
      EXPO_PUBLIC_AUTH_SCHEME: beekeepr
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
      ANDROID_PACKAGE_NAME: com.beekeepr.app
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      FIREBASE_APP_ID: 1:1065098379708:android:65a1522fa9d1bcc037abb9
      FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
      FIREBASE_GROUPS: dev
      FIREBASE_ANDROID_ARTIFACT_TYPE: APK

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release notes from commit
        run: |
          DELIM="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "RELEASE_NOTES<<$DELIM"
            git log -1 --pretty=format:'%s%n%n%b'
            echo
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: corepack enable
      - run: yarn install --immutable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Android APK (Fastlane)
        timeout-minutes: 60
        run: bundle exec fastlane android build_apk --verbose

      - name: Distribute to Firebase App Distribution
        timeout-minutes: 30
        run: bundle exec fastlane android firebase_distribution --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: android-dev-build
          path: build/*.apk
          retention-days: 14
