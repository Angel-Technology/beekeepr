schema: ${EXPO_PUBLIC_GRAPHQL_URL}
documents:
  - src/features/**/*.graphql
generates:
  src/features/auth/graphql/generated/auth.generated.ts:
    config:
      scalars:
        DateTime: string
        UUID: string
      useTypeImports: true
    documents:
      - src/features/auth/graphql/**/*.graphql
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
